<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ за паролем · Урок біології</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{--bg:#0a0e1a;--card:#161d33;--txt:#eef2fb;--muted:#bcc7de;--line:#293556;--acc:#36e2b4;--acc2:#5b8cff;--bad:#ff5c7a;
    --grad:linear-gradient(120deg,#36e2b4,#5b8cff)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background-image:radial-gradient(1000px 500px at 80% -10%,rgba(91,140,255,.18),transparent 60%),
                     radial-gradient(800px 460px at 10% 110%,rgba(54,226,180,.16),transparent 55%)}
  .box{width:min(420px,92vw);background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:34px 30px;box-shadow:0 18px 50px rgba(0,0,0,.5);text-align:center}
  .lock{font-size:2.4rem}
  h1{font-size:1.3rem;margin:.5em 0 .2em}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:.95rem;line-height:1.5;margin:.4em 0 1.3em}
  input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:#0c1326;
    color:var(--txt);font-size:1rem;text-align:center;letter-spacing:.04em}
  input:focus{outline:3px solid var(--acc2);outline-offset:2px}
  button{width:100%;margin-top:14px;padding:14px;border:0;border-radius:12px;background:var(--grad);
    color:#06210f;font-weight:800;font-size:1rem;cursor:pointer;transition:transform .15s}
  button:hover{transform:translateY(-2px)}
  .err{color:var(--bad);font-weight:700;font-size:.9rem;min-height:1.2em;margin-top:12px}
  .hint{font-size:.78rem;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
  <form class="box" id="gate" autocomplete="off">
    <div class="lock">🔒</div>
    <h1>Урок «<span class="grad">Етапи ембріогенезу</span>»</h1>
    <p>Матеріал захищено паролем. Введіть пароль, який надав викладач, щоб відкрити урок.</p>
    <input id="pw" type="password" placeholder="Пароль" autofocus aria-label="Пароль">
    <button type="submit">Відкрити урок →</button>
    <div class="err" id="err" role="alert"></div>
    <div class="hint">Доступ для здобувачів освіти та керівника практики.</div>
  </form>

  const ks = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b(SALT), iterations:ITER, hash:'SHA-256'},
    ks, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(IV)}, key, b(CT));
  return new TextDecoder().decode(buf);
}
document.getElementById('gate').addEventListener('submit', async e=>{
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent='';
  const pw = document.getElementById('pw').value;
  try{
    const html = await decrypt(pw);
    try{ sessionStorage.setItem('lessonPw', pw); }catch(_){}
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent='Невірний пароль. Спробуйте ще раз.';
    document.getElementById('pw').select();
  }
});
// автовідкриття в межах сесії (щоб не вводити пароль повторно при поверненні)
(async()=>{ try{ const p=sessionStorage.getItem('lessonPw'); if(p){ const html=await decrypt(p); document.open(); document.write(html); document.close(); } }catch(_){} })();
